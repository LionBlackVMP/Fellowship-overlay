name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    runs-on: windows-latest
    env:
      CI_VERSION: 0.1.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Apply CI version
        shell: pwsh
        run: ./scripts/set-version.ps1 -Version $env:CI_VERSION

      - name: Build Tauri app
        run: npm run tauri build -- --bundles nsis

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fellowship-overlay-${{ env.CI_VERSION }}-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.CI_VERSION }}
          name: Fellowship Overlay v${{ env.CI_VERSION }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
