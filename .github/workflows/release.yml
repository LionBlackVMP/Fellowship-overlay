name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve next version
        id: version
        shell: pwsh
        run: |
          git fetch --tags --force

          $tags = git tag --list "v0.*.*"
          $latest = $tags |
            ForEach-Object {
              if ($_ -match '^v0\.(\d+)\.(\d+)$') {
                [PSCustomObject]@{
                  Tag = $_
                  Minor = [int]$Matches[1]
                  Patch = [int]$Matches[2]
                }
              }
            } |
            Sort-Object Minor, Patch |
            Select-Object -Last 1

          if ($null -eq $latest) {
            $minor = 1
            $patch = 0
          } else {
            $minor = $latest.Minor
            $patch = $latest.Patch + 1
            if ($patch -gt 9) {
              $minor += 1
              $patch = 0
            }
          }

          $version = "0.$minor.$patch"
          "CI_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Apply CI version
        shell: pwsh
        run: ./scripts/set-version.ps1 -Version $env:CI_VERSION

      - name: Build Tauri app
        run: npm run tauri build -- --bundles nsis

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fellowship-overlay-${{ env.CI_VERSION }}-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.CI_VERSION }}
          name: Fellowship Overlay v${{ env.CI_VERSION }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
